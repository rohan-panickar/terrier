name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: fmt / clippy / test / doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install stable toolchain with rustfmt + clippy
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable (2025-01)
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: fmt --check
        run: cargo fmt --check

      - name: clippy -D warnings
        run: cargo clippy --all-targets

      - name: test
        run: cargo test

      - name: doc (no-deps)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps

      - name: package --list (verify publishable; no publish)
        run: cargo package --list
