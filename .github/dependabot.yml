version: 2
updates:
  # Bumps SHA-pinned GitHub Actions; Dependabot updates the SHA and the
  # `# vX.Y.Z` comment together.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Cargo dependency bumps for the workspace, grouped to one PR/week.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    groups:
      cargo:
        patterns:
          - "*"
